<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Gestión de Tareas</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif
}
#sistema{
    display:block
}
.contenedor{
width:95%;
max-width:1200px;
margin:20px auto
}
.cabecera,.card,.tarea,.formulario{
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1)
}
.cabecera{
    display:flex;
    gap:15px;
    align-items:center;
    padding:15px;
    background:linear-gradient(
        135deg,
        #8f7f72,
        #6d5f54
    );
    color:white;
}
.menu{
    font-size:28px;
    cursor:pointer
}

h1{
    flex:1
}

.buscar{
    padding:10px;
    width:250px;
    border:2px solid #d7c9bb;
    border-radius:8px;
}
.btn{
    padding:10px 15px;
    background:#8f7f72;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.btn:hover{
    background:#6d5f54;
}
.dashboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-top:20px
}
.card{
    text-align:center;
    padding:20px;
    background:#ffffff;
    border-left:5px solid #8f7f72;
}
.card h3{
    color:#6d5f54;
}
.filtros{
    margin:20px 0
}
.filtros button{
    padding:10px 15px;
    margin-right:8px;
    background:#8f7f72;
    color:white;
    border:none;
    border-radius:8px;
}
.filtros button:hover{
    background:#6d5f54;
}
.tarea{
    display:flex;
    gap:15px;align-items:center;
    padding:15px;
    margin-bottom:10px
}
.tarea{
    border-left:5px solid #8f7f72;
}
.info{
    flex:1
}
.hecha .titulo{
    text-decoration:line-through;
    color:gray
}
.menu-lateral{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:240px;
    height:100%;
    background:#8f7f72;
    color:white;
    box-shadow:2px 0 10px rgba(0,0,0,.2);
}
.menu-lateral h2{
    padding:20px
}
.cerrar-menu{
    position:absolute;
    top:10px;right:15px;
    font-size:28px;cursor:pointer;
    font-weight:bold
}
.menu-lateral a{
    display:block;
    padding:14px 20px;
    text-decoration:none;
    color:white;
}
.menu-lateral a:hover{
    background:#6d5f54;
}
.modal{
    display:none;
    position:fixed;
    inset:0;background:rgba(0,0,0,.4)
}
.formulario{
    width:420px;
    margin:60px auto;
    padding:20px;
    background:#fff;
    border-top:6px solid #8f7f72;
}

.formulario button{
    background:#8f7f72;
    color:white;
    border:none;
    border-radius:8px;
    padding:10px 15px;
}

.formulario button:hover{
    background:#6d5f54;
}

.formulario input,.formulario textarea,.formulario select{
    width:100%;
    padding:10px;
    margin:8px 0
}
.acciones button{
    margin-left:8px
    }
</style>
</head>
<body>

<div class="menu-lateral" id="menuLateral">
<div class="cerrar-menu" onclick="cerrarMenu()">×</div>
<h2>Menú</h2>
<a href="#" onclick="filtrar('todas')">Todas las tareas</a>
<a href="#" onclick="filtrar('pendiente')">Pendientes</a>
<a href="#" onclick="filtrar('hecha')">Completadas</a>
<a href="#" onclick="abrirModal()">Nueva Tarea</a>
<a href="#" onclick="cerrarSesion()">Cerrar Sesión</a>
</div>

<div id="sistema">
<div class="contenedor">
<div class="cabecera">
<div class="menu" onclick="abrirMenu()">☰</div>
<h1>Sistema de Gestión de Tareas</h1>
<input class="buscar" id="buscar" placeholder="Buscar tarea..." onkeyup="buscarTarea()">
<button class="btn" onclick="abrirModal()">Nueva Tarea</button>
</div>

<div class="dashboard">
<div class="card"><h3>Total</h3><h2 id="total">0</h2></div>
<div class="card"><h3>Pendientes</h3><h2 id="pendientes">0</h2></div>
<div class="card"><h3>Completadas</h3><h2 id="completadas">0</h2></div>
</div>

<div class="filtros">
<button onclick="filtrar('todas')">Todas</button>
<button onclick="filtrar('pendiente')">Pendientes</button>
<button onclick="filtrar('hecha')">Completadas</button>
</div>

<div id="lista"></div>
</div>
</div>

<div class="modal" id="modal">
<div class="formulario">
<h2>Registro de Nueva Tarea</h2>
<input id="titulo" placeholder="Título">
<textarea id="descripcion" placeholder="Descripción"></textarea>
<select id="prioridad">
<option>Alta</option><option>Media</option><option>Baja</option>
</select>
<input type="date" id="fechaLimite">
<button onclick="guardarTarea()">Guardar</button>
<button onclick="cerrarModal()">Cancelar</button>
</div>
</div>

<script>
let tareaEditando=null;


function cerrarSesion(){

    if(confirm("¿Cerrar sesión?")){

        localStorage.removeItem("sesion");

        window.location.href="login.html";

    }

}

function abrirMenu(){menuLateral.style.display=menuLateral.style.display==="block"?"none":"block";}
function cerrarMenu(){menuLateral.style.display="none";}
function abrirModal(){modal.style.display="block";}
function cerrarModal(){modal.style.display="none";titulo.value="";descripcion.value="";tareaEditando=null;}

function guardarTarea(){
if(titulo.value.trim()===""){alert("Ingrese un título");return;}
const prioridad=prioridadSel= document.getElementById("prioridad").value;
const fecha=document.getElementById("fechaLimite").value;

if(tareaEditando){
tareaEditando.querySelector(".titulo").innerText=titulo.value;
tareaEditando.querySelector(".descripcion").innerText=descripcion.value;
}else{
let tarea=document.createElement("div");
tarea.className="tarea pendiente";
tarea.innerHTML=`<input type="checkbox" onchange="cambiarEstado(this)">
<div class="info">
<div class="titulo"><b>${titulo.value}</b></div>
<div class="descripcion">${descripcion.value}</div>
<small>Prioridad: ${prioridad}</small><br>
<small>Fecha límite: ${fecha}</small>
</div>
<div class="acciones">
<button onclick="editar(this)">Modificar</button>
<button onclick="eliminar(this)">Eliminar</button>
</div>`;
lista.appendChild(tarea);
}
actualizarDashboard();
cerrarModal();
}

function editar(btn){
tareaEditando=btn.closest(".tarea");
titulo.value=tareaEditando.querySelector(".titulo").innerText;
descripcion.value=tareaEditando.querySelector(".descripcion").innerText;
abrirModal();
}

function eliminar(btn){
if(confirm("¿Eliminar tarea?")){
btn.closest(".tarea").remove();
actualizarDashboard();
}
}

function cambiarEstado(check){
let t=check.closest(".tarea");
if(check.checked){t.classList.remove("pendiente");t.classList.add("hecha");}
else{t.classList.remove("hecha");t.classList.add("pendiente");}
actualizarDashboard();
}

function filtrar(tipo){
document.querySelectorAll(".tarea").forEach(t=>{
if(tipo==="todas") t.style.display="flex";
else if(tipo==="pendiente") t.style.display=t.classList.contains("pendiente")?"flex":"none";
else t.style.display=t.classList.contains("hecha")?"flex":"none";
});
}

function buscarTarea(){
let txt=buscar.value.toLowerCase();
document.querySelectorAll(".tarea").forEach(t=>{
t.style.display=t.innerText.toLowerCase().includes(txt)?"flex":"none";
});
}

function actualizarDashboard(){
total.innerText=document.querySelectorAll(".tarea").length;
pendientes.innerText=document.querySelectorAll(".pendiente").length;
completadas.innerText=document.querySelectorAll(".hecha").length;
}


</script>
<script src="js/tareas.js"></script>
</body>
</html>
