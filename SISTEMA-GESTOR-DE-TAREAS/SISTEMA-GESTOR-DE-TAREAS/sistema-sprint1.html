<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Gestión de Tareas</title>

<script>

if(localStorage.getItem("sesion")!="activa"){

    window.location.href="index.html";

}

</script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

.cabecera{
    background:linear-gradient(135deg,#8f7f72,#6d5f54);
    color:white;
    padding:15px 25px;
    display:flex;
    gap:15px;
    align-items:center;
}

.buscar{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
}

.btn{
    padding:10px 15px;
    background:white;
    color:#6d5f54;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.contenido{
    display:flex;
}

.sidebar{
    width:220px;
    min-height:100vh;
    background:#6d5f54;
    padding:20px;
}

.sidebar h2{
    color:white;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
}

.sidebar a:hover{
    background:#8f7f72;
}

.main{
    flex:1;
    padding:25px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    padding:20px;
    text-align:center;
    border-radius:10px;
    border-left:5px solid #8f7f72;
}
.kanban{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    align-items:start;
}
.columna{
    background:#e4dfd9;
    padding:20px;
    border-radius:12px;
    min-height:600px;
    display:flex;
    flex-direction:column;
}
.columna h2{
    text-align:center;
    margin-bottom:15px;
}

.tarea{
    background:rgb(251, 251, 251);
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    border-left:5px solid #8f7f72;
}

.acciones{
    margin-top:10px;
}

.acciones button{
    margin-right:5px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
}

.formulario{
    width:400px;
    background:white;
    margin:50px auto;
    padding:20px;
    border-radius:10px;
}

.formulario input,
.formulario textarea,
.formulario select{
    width:100%;
    padding:10px;
    margin:10px 0;
}

.formulario button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

.formulario button:first-of-type{
    background:#8f7f72;
    color:white;
}

.formulario button:first-of-type:hover{
    background:#6d5f54;
}

.formulario button:last-of-type{
    background:#d7c9bb;
    color:#4a4038;
}

.formulario button:last-of-type:hover{
    background:#c7b7a6;
}

.acciones button{
    background:#a86a6a;
    color:white;
    border:none;
    border-radius:8px;
    padding:8px 12px;
    cursor:pointer;
}

.acciones button:hover{
    background:#8a5555;
}

@media(max-width:768px){

    .contenido{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .dashboard{
        grid-template-columns:1fr;
    }

    .kanban{
        grid-template-columns:1fr;
    }

    .cabecera{
        flex-direction:column;
    }
}

</style>
</head>
<body>

<header class="cabecera">
    <h1>Gestor de Tareas TO-DO</h1>

    <input
        type="text"
        id="buscar"
        class="buscar"
        placeholder="Buscar tarea..."
        onkeyup="buscarTarea()">

    <button class="btn" onclick="abrirModal()">
        + Nueva Tarea
    </button>
</header>

<div class="contenido">

    <aside class="sidebar">

        <h2>Menú</h2>

        <a href="#">Inicio</a>

        <a href="#">Calendario</a>

        <a href="#" onclick="cerrarSesion()">
            Cerrar Sesión
        </a>

    </aside>

    <main class="main">

        <section class="dashboard">

            <div class="card">
                <h3>Total</h3>
                <h2 id="total">0</h2>
            </div>

            <div class="card">
                <h3>Pendientes</h3>
                <h2 id="pendientes">0</h2>
            </div>

            <div class="card">
                <h3>Completadas</h3>
                <h2 id="completadas">0</h2>
            </div>

        </section>

<section class="kanban">

    <div class="columna">
        <h2>Todas</h2>
        <div id="colTodas"></div>
    </div>

    <div class="columna">
        <h2>Pendientes</h2>
        <div id="colPendientes"></div>
    </div>

    <div class="columna">
        <h2>Completadas</h2>
        <div id="colCompletadas"></div>
    </div>

</section>
    </main>

</div>

<div class="modal" id="modal">

    <div class="formulario">

        <h2>Nueva Tarea</h2>

        <input
            type="text"
            id="titulo"
            placeholder="Título">

        <textarea
            id="descripcion"
            placeholder="Descripción"></textarea>

        <select id="prioridad">
            <option>Alta</option>
            <option>Media</option>
            <option>Baja</option>
        </select>

        <input
            type="date"
            id="fechaLimite">

        <button onclick="guardarTarea()">
            Guardar
        </button>

        <button onclick="cerrarModal()">
            Cancelar
        </button>

    </div>

</div>

<script>

function abrirModal(){
    document.getElementById("modal").style.display = "block";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

function cerrarSesion(){

    if(confirm("¿Cerrar sesión?")){

        localStorage.removeItem("sesion");

        window.location.href="sistema-sprint2.html";

    }

}
</script>
<script src="js/tareas.js"></script>
</body>
</html>
