<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Gestión de Tareas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.pantalla-login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    width:380px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

.login-box button{
    width:100%;
    padding:12px;
    background:#6d5f54;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.login-box button:hover{
    background:#6d5f54;
}

.credenciales{
    text-align:center;
    margin-top:20px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="pantalla-login">

    <div class="login-box">

        <h2>📋 Sistema de Gestión de Tareas</h2>

        <input
            type="text"
            id="usuario"
            placeholder="Usuario">

        <input
            type="password"
            id="clave"
            placeholder="Contraseña">

        <button onclick="iniciarSesion()">
            Ingresar
        </button>

        <p class="credenciales">
            Usuario: admin | Contraseña: 1234
        </p>

    </div>

</div>

<script>

function iniciarSesion(){

    let usuario =
    document.getElementById("usuario").value;

    let clave =
    document.getElementById("clave").value;

    if(usuario==="admin" && clave==="1234"){

        localStorage.setItem(
            "sesion",
            "activa"
        );

        window.location.href =
        "sistema-sprint1.html";

    }else{

        alert("Usuario o contraseña incorrectos");

    }

}

</script>

</body>
</html>
